<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="./game-styles.css">
</head>

<body>
    <h1 id="game-title">Tic Tac Toe</h1>

    <div id="game-controls">
        <button type="button" class="control" id="homeButton" value="Home" onclick="returnButton()">
            <img src="../../images/home.png" alt="Home button" />
        </button>
        <button type="button" class="control" id="restartButton" value="Restart" onclick="restartButton()">
            <img src="../../images/restart.png" alt="Restart button" />
        </button>
    </div>

    <div id="game-board">
        <div class="square" id="square0"></div>
        <div class="square" id="square1"></div>
        <div class="square" id="square2"></div>
        <div class="square" id="square3"></div>
        <div class="square" id="square4"></div>
        <div class="square" id="square5"></div>
        <div class="square" id="square6"></div>
        <div class="square" id="square7"></div>
        <div class="square" id="square8"></div>
    </div>

    <script src="game.js"></script>
</body>

</html>
